site_name: Agentic Software Modernization Glossar
site_description: Ein Glossar mit Begriffen rund um agentengestützte Softwaremodernisierung.
site_author: Markus Harrer
site_url: https://feststelltaste.github.io/asm-glossary/de/

docs_dir: docs/de
site_dir: site/de

theme:
  name: material
  custom_dir: overrides
  language: de
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: In den Dunkelmodus wechseln
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: In den Hellmodus wechseln
  font:
    text: Open Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes

    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.tooltips
    - content.code.copy
    - header.autohide

extra_css:
  - ../stylesheets/extra.css

hooks:
  - hooks/translation_link.py

extra_javascript:
  - ../javascripts/header.js
  - ../javascripts/mermaid-fullscreen.js

extra:
  generator: false
  alternate:
    - name: English
      link: /asm-glossary/
      lang: en
    - name: Deutsch
      link: /asm-glossary/de/
      lang: de
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/feststelltaste/asm-glossary
    - icon: fontawesome/solid/globe
      link: https://markusharrer.de

copyright: >
  &copy; 2026 <a href="https://markusharrer.de">Markus Harrer</a> |
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a> |
  Made with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank">Material for MkDocs</a>

plugins:
  - search:
      lang: de
  - social:
      cards_layout_options:
        background_color: "#1C1C1C"
        color: "#22C55E"
        font_family: Open Sans

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

