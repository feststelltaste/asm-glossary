site_name: Agentic Software Modernization Glossary
site_description: A glossary of terms related to agent-assisted software modernization.
site_author: Markus Harrer
site_url: https://feststelltaste.github.io/asm-glossary/

theme:
  name: material
  custom_dir: overrides
  language: en
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Open Sans
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes

    - navigation.tracking
    - navigation.path
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - search.share
    - content.tooltips
    - content.code.copy
    - header.autohide

extra_css:
  - stylesheets/extra.css

hooks:
  - hooks/translation_link.py

extra_javascript:
  - javascripts/header.js
  - javascripts/mermaid-fullscreen.js

