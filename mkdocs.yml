extra:
  generator: false
  alternate:
    - name: English
      link: /asm-glossary/
      lang: en
    - name: Deutsch
      link: /asm-glossary/de/
      lang: de
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/feststelltaste/asm-glossary
    - icon: fontawesome/solid/globe
      link: https://markusharrer.de

copyright: >
  &copy; 2026 <a href="https://markusharrer.de">Markus Harrer</a> |
  <a href="https://creativecommons.org/licenses/by-sa/4.0/" target="_blank">CC BY-SA 4.0</a> |
  Made with <a href="https://squidfunk.github.io/mkdocs-material/" target="_blank">Material for MkDocs</a>

exclude_docs: |
  de/

plugins:
  - search
  - social:
      cards_layout_options:
        background_color: "#1C1C1C"
        color: "#22C55E"
        font_family: Open Sans

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true
